<!DOCTYPE html>
<html>
<head>
    <title>Music Sync Client</title>
    <!-- Подключаем SignalR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <!-- Подключаем наш класс -->
    <script src="client.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Создаем клиент и сохраняем его в глобальной области видимости
            window.client = new MusicSyncClient(1);
            //window.client = new MusicSyncClient('ROOM_ID');
            window.client.connect();
            
            // Добавим обработчики для аудио плеера, чтобы отправлять события на сервер
            const audio = document.getElementById('audioPlayer');
            
            audio.addEventListener('play', () => {
                window.client.pauseTrack(); // или playTrack с текущей позицией
            });
            
            audio.addEventListener('pause', () => {
                window.client.pauseTrack();
            });
            
            audio.addEventListener('seeked', () => {
                window.client.seekTrack(audio.currentTime);
            });
        });
    </script>
</head>

<body>
    <div>
        <h2>Room: <span id="roomName"></span></h2>
        <p>Users connected: <span id="userCount">0</span></p>
        <p>Now playing: <span id="currentTrack"></span></p>

        <audio id="audioPlayer" controls></audio>

        <h3>Playlist:</h3>
        <ul id="trackList"></ul>

        <!-- Используем переименованный метод -->
        <button onclick="window.client.requestSync()">Sync</button>
    </div>
</body>

</html>
